<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход в системата</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: white; border-radius: 20px; padding: 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
        }
        .login-title { font-size: 1.5rem; font-weight: 700; color: #222; }
        .login-subtitle { color: #888; font-size: .9rem; margin-bottom: 28px; }
        .form-control { border-radius: 10px; padding: 12px 14px; border: 1.5px solid #e0e0e0; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15); }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; border-radius: 10px; padding: 13px;
            font-size: 1rem; font-weight: 600;
        }
        .btn-login:hover { opacity: .9; }
        .divider { color: #aaa; font-size: .85rem; text-align: center; margin: 18px 0; }
        .register-link {
            display: block; text-align: center;
            background: #f0f4ff; border: 1.5px dashed #667eea;
            border-radius: 10px; padding: 13px;
            color: #667eea; font-weight: 600; text-decoration: none;
            transition: background .2s;
        }
        .register-link:hover { background: #e8edff; color: #5a6fd6; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-3">
            <span style="font-size:2.8rem;">🏛️</span>
        </div>
        <div class="text-center">
            <div class="login-title">Счетоводна система</div>
            <div class="login-subtitle">Влезте с вашите данни</div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 mb-3">
            ❌ Грешно потребителско ime или парола.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 mb-3">
            ✅ Излязохте успешно от системата.
        </div>
        <div th:if="${param.registered}" class="alert alert-success py-2 mb-3">
            ✅ Регистрацията е успешна! Вече може да влезете.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Потребителско ime</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Въведете потребителско ime" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Парола</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Въведете парола" required>
            </div>
            <div class="d-grid mb-3">
                <button type="submit" class="btn text-white btn-login">🔐 Вход</button>
            </div>
        </form>

        <div class="divider">— нямате акаунт? —</div>

        <a th:href="@{/register}" class="register-link">
            🏢 Регистрирайте вашата кантора
        </a>
    </div>
</body>
</html>
