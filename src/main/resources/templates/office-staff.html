<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Управление на служители</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-radius: 14px;
            padding: 22px 28px; margin-bottom: 24px;
        }
        .card { border: none; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,.07); }
        .card-header { border-radius: 14px 14px 0 0 !important; font-weight: 600; }
        .table th { font-size: .85rem; color: #666; text-transform: uppercase; letter-spacing: .03em; font-weight: 600; }
        .table td { vertical-align: middle; }
        .badge-OFFICE { background: #764ba2; }
        .badge-USER   { background: #0d6efd; }
        .form-control { border-radius: 9px; }
        .btn-add { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 9px; }
    </style>
</head>
<body>
<div class="container py-4">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-0 fw-bold">👥 Служители на кантора</h4>
            <small class="opacity-75" th:text="${officeName}"></small>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/companies}" class="btn btn-light btn-sm">🏢 Фирми</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">🚪 Изход</button>
            </form>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        ✅ <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        ❌ <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Форма за добавяне на служител -->
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header bg-primary text-white">➕ Добави служител</div>
                <div class="card-body">
                    <form th:action="@{/office/staff/add}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Потребителско ime</label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="ivan.petrov" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Начална парола</label>
                            <input type="text" name="password" class="form-control"
                                   placeholder="Задайте парола" required>
                            <div class="form-text">Служителят може да я смени след вход.</div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn text-white btn-add">✅ Добави</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Таблица с всички служители -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-light text-dark d-flex justify-content-between">
                    <span>📋 Служители</span>
                    <span class="badge bg-secondary" th:text="${#lists.size(staff)} + ' потребители'"></span>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Потребителско ime</th>
                                <th>Роля</th>
                                <th class="text-center">Изтрий</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="member : ${staff}">
                                <td>
                                    <strong th:text="${member.username}"></strong>
                                    <span th:if="${member.username == #authentication.name}"
                                          class="badge bg-success ms-1">Вие</span>
                                </td>
                                <td>
                                    <span class="badge text-white"
                                          th:classappend="'badge-' + ${#strings.replace(member.role,'ROLE_','')}"
                                          th:text="${member.role == 'ROLE_OFFICE'} ? 'Собственик' : 'Служител'">
                                    </span>
                                </td>
                                <td class="text-center">
                                    <form th:action="@{/office/staff/delete/{id}(id=${member.id})}"
                                          method="post"
                                          th:if="${member.username != #authentication.name}"
                                          onsubmit="return confirm('Изтриване на ' + this.dataset.name + '?');"
                                          th:data-name="${member.username}">
                                        <button type="submit" class="btn btn-outline-danger btn-sm">🗑</button>
                                    </form>
                                    <span th:if="${member.username == #authentication.name}"
                                          class="text-muted small">—</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(staff)}">
                                <td colspan="3" class="text-center text-muted py-4">
                                    Няма добавени служители.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
