<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работени фирми</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .filter-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }

        .table-custom {
            overflow: hidden;
            border-radius: 15px;
        }

        .table thead {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }

        .table td,
        .table th {
            vertical-align: middle;
            text-align: center;
        }

        /* STATUS COLORS */

        .yes-row td {
            background-color: #c8f7c5 !important;
            transition: 0.2s;
        }

        .yes-row:hover td {
            background-color: #b6efb2 !important;
        }

        .no-row td {
            background-color: #ffc9c9 !important;
            transition: 0.2s;
        }

        .no-row:hover td {
            background-color: #ffb3b3 !important;
        }

        .empty-row td {
            background-color: #eeeeee !important;
            transition: 0.2s;
        }

        .empty-row:hover td {
            background-color: #dddddd !important;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 600;
        }

        .status-select {
            border-radius: 10px;
            font-weight: 600;
        }

        .badge-month {
            font-size: 15px;
            padding: 8px 12px;
        }

    </style>
</head>

<body>

<div class="container py-4">

    <!-- HEADER -->
    <div class="page-header text-center">
        <h1>✔ Работени фирми</h1>
        <p class="mb-0">Управление на месечни обработки</p>
    </div>

    <!-- TOP ACTIONS -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <a href="/companies" class="btn btn-outline-dark btn-custom">
            ⬅ Назад
        </a>

        <form action="/companies/copy-month" method="post" class="m-0">

            <input type="hidden" name="month" th:value="${selectedMonth}">
            <input type="hidden" name="year" th:value="${selectedYear}">

            <button type="submit" class="btn btn-primary btn-custom">
                📅 Нов месец
            </button>
        </form>

    </div>

    <!-- FILTER -->
    <div class="filter-box">

        <form method="get" action="/companies/worked">

            <div class="row g-3 align-items-end">

                <!-- MONTH -->
                <div class="col-md-2">
                    <label class="form-label fw-bold">Месец</label>

                    <select name="month" class="form-select">

                        <option th:each="m : ${#numbers.sequence(1,12)}"
                                th:value="${m}"
                                th:text="${m}"
                                th:selected="${m == selectedMonth}">
                        </option>

                    </select>
                </div>

                <!-- YEAR -->
                <div class="col-md-2">
                    <label class="form-label fw-bold">Година</label>

                    <input type="number"
                           name="year"
                           class="form-control"
                           th:value="${selectedYear}">
                </div>

                <!-- SEARCH -->
                <div class="col-md-5">
                    <label class="form-label fw-bold">Търсене</label>

                    <input type="text"
                           name="search"
                           class="form-control"
                           placeholder="Търси фирма..."
                           th:value="${search}">
                </div>

                <!-- BUTTON -->
                <div class="col-md-3">
                    <button type="submit"
                            class="btn btn-success w-100 btn-custom">
                        🔍 Покажи
                    </button>
                </div>

            </div>

        </form>

    </div>

    <!-- TABLE -->
    <div class="card card-custom">

        <div class="card-body table-custom">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead>
                    <tr>
                        <th>🏢 Фирма</th>
                        <th>📅 Месец</th>
                        <th>📊 Статус</th>
                        <th>🗑️ Изтриване</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="c : ${companies}"

                        th:class="${
                            c.statistics2 != null ?

                            (c.statistics2.toString() == 'YES' ?
                                'yes-row' :

                                (c.statistics2.toString() == 'NO' ?
                                    'no-row' :
                                    'empty-row'))

                            : 'empty-row'
                        }">

                        <!-- COMPANY -->
                        <td class="fw-semibold"
                            th:text="${c.name}">
                        </td>

                        <!-- MONTH -->
                        <td>
                            <span class="badge bg-primary badge-month"
                                  th:text="${selectedMonth}">
                            </span>
                        </td>

                        <!-- STATUS -->
                        <td>

                            <form th:action="@{/companies/update-worked}"
                                  method="post">

                                <input type="hidden"
                                       name="id"
                                       th:value="${c.id}">

                                <input type="hidden"
                                       name="month"
                                       th:value="${selectedMonth}">

                                <input type="hidden"
                                       name="year"
                                       th:value="${selectedYear}">

                                <select name="status"
                                        class="form-select status-select"
                                        onchange="this.form.submit()">

                                    <option th:each="s : ${statuses}"
                                            th:value="${s}"

                                            th:text="${
                                                s.name() == 'YES' ? '✅ Да' :
                                                (s.name() == 'NO' ? '❌ Не' : '➖ -----')
                                            }"

                                            th:selected="${s == c.statistics2}">
                                    </option>

                                </select>

                            </form>

                        </td>

                        <!-- DELETE -->
                        <td>

                            <form th:action="@{/companies/worked/delete/{id}(id=${c.workedId})}"

                                  th:if="${c.workedId != null}"

                                  method="post">

                                <input type="hidden"
                                       name="month"
                                       th:value="${selectedMonth}">

                                <input type="hidden"
                                       name="year"
                                       th:value="${selectedYear}">

                                <button type="submit"
                                        class="btn btn-danger btn-sm btn-custom">
                                    ❌
                                </button>

                            </form>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>
</html>
