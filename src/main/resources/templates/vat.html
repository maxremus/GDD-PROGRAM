<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДДС Калкулатор</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,  #fff 0%, #d6c2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .vat-card {
            width: 100%;
            max-width: 480px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: white;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .card-header-custom h2 {
            margin: 0;
            font-weight: bold;
        }

        .card-body-custom {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
            border: 1px solid #dcdcdc;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,.25);
            border-color: #667eea;
        }

        .btn-calc {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            height: 50px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-calc:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .result-box {
            background: #f8f9ff;
            border-left: 5px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 17px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            color: #198754;
        }

        .back-btn {
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            font-weight: bold;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: #4f46e5;
        }
    </style>
</head>
<body>

<div class="vat-card">

    <!-- HEADER -->
    <div class="card-header-custom">
        <h2>🧮 ДДС Калкулатор</h2>
        <p class="mb-0 mt-2">Изчисли ДДС бързо и лесно</p>
    </div>

    <!-- BODY -->
    <div class="card-body-custom">

        <form th:action="@{/companies/vat}" method="post">

            <div class="mb-4">
                <label class="form-label">💰 Сума без ДДС</label>
                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control"
                       placeholder="Например: 1000 €"
                       required>
            </div>

            <div class="mb-4">
                <label class="form-label">📊 ДДС %</label>
                <input type="number"
                       step="0.01"
                       name="rate"
                       value="20"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="btn btn-primary btn-calc w-100">
                Изчисли
            </button>

        </form>

        <!-- RESULT -->
        <div class="result-box" th:if="${vat != null}">

            <div class="result-item">
                <span>Сума без ДДС:</span>
                <strong><span th:text="${amount}"></span> €.</strong>
            </div>

            <div class="result-item">
                <span>ДДС:</span>
                <strong><span th:text="${vat}"></span> €.</strong>
            </div>

            <hr>

            <div class="result-item total">
                <span>Крайна сума:</span>
                <span th:text="${total}"></span> €.
            </div>

        </div>

        <!-- BACK -->
        <div class="text-center">
            <a th:href="@{/companies}" class="back-btn">
                ⬅ Назад към фирмите
            </a>
        </div>

    </div>

</div>

</body>
</html>
