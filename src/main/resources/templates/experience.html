<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Трудов стаж калкулатор</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card-custom {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 20px;
        }

        .result-box {
            background: #e9f7ef;
            border-left: 5px solid #28a745;
            padding: 15px;
            border-radius: 8px;
        }

        .period-row {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card card-custom">

        <!-- HEADER -->
        <div class="header text-center">
            <h3>📅 Калкулатор за трудов стаж (НОИ)</h3>
            <p class="mb-0">Изчислява общ стаж от множество периоди</p>
        </div>

        <!-- BODY -->
        <div class="card-body">

            <!-- FORM -->
            <form th:action="@{/companies/experience-noi}" method="post">

                <div id="periods">

                    <div class="row period-row">
                        <div class="col-md-5">
                            <label class="form-label">Начална дата</label>
                            <input type="date" name="startDates" class="form-control" required>
                        </div>

                        <div class="col-md-5">
                            <label class="form-label">Крайна дата</label>
                            <input type="date" name="endDates" class="form-control" required>
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-danger w-100" onclick="removeRow(this)">
                                ✖
                            </button>
                        </div>
                    </div>

                </div>

                <!-- BUTTONS -->
                <div class="d-flex gap-3 mt-3">
                    <button type="button" class="btn btn-outline-primary" onclick="addPeriod()">
                        ➕ Добави период
                    </button>

                    <button type="submit" class="btn btn-success">
                        🧮 Изчисли стаж
                    </button>
                </div>

            </form>

            <!-- RESULT -->
            <div class="mt-4" th:if="${years != null}">
                <div class="result-box text-center">
                    <h4>📊 Общ трудов стаж</h4>
                    <h2>
                        <span th:text="${years}"></span> г.,
                        <span th:text="${months}"></span> м.,
                        <span th:text="${days}"></span> дни
                    </h2>
                </div>
            </div>

            <!-- BACK -->
            <div class="text-center mt-4">
                <a th:href="@{/companies}" class="btn btn-secondary">
                    ⬅ Назад към фирми
                </a>
            </div>

        </div>
    </div>

</div>

<!-- JS -->
<script>
    function addPeriod() {
        const div = document.createElement("div");
        div.classList.add("row", "period-row");

        div.innerHTML = `
            <div class="col-md-5">
                <input type="date" name="startDates" class="form-control" required>
            </div>

            <div class="col-md-5">
                <input type="date" name="endDates" class="form-control" required>
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button type="button" class="btn btn-danger w-100" onclick="removeRow(this)">✖</button>
            </div>
        `;

        document.getElementById("periods").appendChild(div);
    }

    function removeRow(btn) {
        btn.closest(".period-row").remove();
    }
</script>

</body>
</html>
