<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Плащане успешно</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height:100vh;
            display:flex; align-items:center; justify-content:center; }
        .card { border:none; border-radius:20px; padding:48px; text-align:center;
            max-width:440px; box-shadow:0 25px 70px rgba(0,0,0,.4); }
        .icon { font-size:4rem; margin-bottom:16px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✅</div>
    <h3 class="fw-bold mb-3">Плащането е успешно!</h3>
    <p class="text-muted mb-4" th:text="${successMessage}"></p>
    <a th:href="@{/companies}" class="btn btn-primary w-100" style="border-radius:10px;padding:12px;">
        Към системата →
    </a>
</div>
</body>
</html>
