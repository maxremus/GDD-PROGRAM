<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Плащане успешно</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#0f3460,#16213e,#1a1a2e);
               min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:white; border:none; border-radius:20px; padding:48px 40px;
                text-align:center; max-width:460px; width:100%;
                box-shadow:0 25px 70px rgba(0,0,0,.4); }
        .icon { font-size:4.5rem; margin-bottom:16px; animation: pop .5s ease; }
        @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.15)} 100%{transform:scale(1)} }
        .btn-go { background:linear-gradient(135deg,#667eea,#764ba2); border:none;
                  border-radius:12px; padding:14px; font-size:1rem; font-weight:600; }
        .btn-go:hover { opacity:.9; transform:translateY(-1px); }
        /* Auto-redirect countdown */
        .countdown { font-size:.85rem; color:#aaa; margin-top:12px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✅</div>
    <h3 class="fw-bold mb-2">Плащането е успешно!</h3>
    <p class="text-muted mb-4" th:text="${successMessage}">Абонаментът е активиран.</p>

    <a th:href="@{/companies}" class="btn text-white btn-go w-100">
        🚀 Към системата →
    </a>

    <div class="countdown" id="countdown">
        Автоматично пренасочване след <span id="secs">5</span> секунди...
    </div>
</div>

<script>
    // Автоматично пренасочване след 5 секунди
    let secs = 5;
    const el = document.getElementById('secs');
    const interval = setInterval(() => {
        secs--;
        el.textContent = secs;
        if (secs <= 0) {
            clearInterval(interval);
            window.location.href = '/companies';
        }
    }, 1000);
</script>
</body>
</html>
