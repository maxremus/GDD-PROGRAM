<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Системен панел — всички кантори</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; }
        .page-header {
            background: linear-gradient(135deg, #e53935 0%, #b71c1c 100%);
            color: white; border-radius: 14px;
            padding: 22px 28px; margin-bottom: 24px;
        }
        .card { border: none; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,.07); }
        .card-header { border-radius: 14px 14px 0 0 !important; font-weight: 600; }
        .table th { font-size: .85rem; color: #666; text-transform: uppercase; letter-spacing: .03em; font-weight: 600; }
        .table td { vertical-align: middle; }
        .badge-ADMIN  { background: #dc3545; }
        .badge-OFFICE { background: #764ba2; }
        .badge-USER   { background: #0d6efd; }
    </style>
</head>
<body>
<div class="container py-4">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-0 fw-bold">🔧 Системен панел — Всички кантори</h4>
            <small class="opacity-75">Достъпен само за системния администратор</small>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/companies}" class="btn btn-light btn-sm">🏢 Начало</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">🚪 Изход</button>
            </form>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        ✅ <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        ❌ <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header bg-light text-dark d-flex justify-content-between">
            <span>📋 Всички регистрирани потребители</span>
            <span class="badge bg-secondary" th:text="${#lists.size(users)} + ' потребители'"></span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Потребителско ime</th>
                        <th>Кантора</th>
                        <th>Office ID</th>
                        <th>Роля</th>
                        <th class="text-center">Изтрий</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td><strong th:text="${user.username}"></strong></td>
                        <td>
                            <span th:if="${user.officeName != null}"
                                  th:text="${user.officeName}" class="text-dark"></span>
                            <span th:if="${user.officeName == null}"
                                  class="text-muted">—</span>
                        </td>
                        <td>
                            <code th:if="${user.officeId != null}"
                                  th:text="${user.officeId}" class="text-muted small"></code>
                            <span th:if="${user.officeId == null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span class="badge text-white"
                                  th:classappend="'badge-' + ${#strings.replace(user.role,'ROLE_','')}"
                                  th:text="${#strings.replace(user.role,'ROLE_','')}"></span>
                        </td>
                        <td class="text-center">
                            <form th:action="@{/admin/users/delete/{id}(id=${user.id})}"
                                  method="post"
                                  onsubmit="return confirm('Изтриване на ' + this.dataset.name + '?');"
                                  th:data-name="${user.username}">
                                <button type="submit" class="btn btn-outline-danger btn-sm">🗑</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="5" class="text-center text-muted py-4">Няма регистрирани потребители.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
