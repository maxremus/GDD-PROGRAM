<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Нетна → Брутна заплата</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial;
        }

        .card-custom{
            max-width:700px;
            margin:auto;
            margin-top:50px;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .header{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            padding:30px;
            text-align:center;
        }

        .result-box{
            background:#f8f9ff;
            border-radius:15px;
            padding:20px;
        }

        .result-item{
            display:flex;
            justify-content:space-between;
            margin-bottom:12px;
            font-size:18px;
        }

        .result-item strong{
            color:#333;
        }

        .main-net{
            background:#d1fae5;
            padding:15px;
            border-radius:12px;
            margin-bottom:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:#065f46;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="card card-custom">

        <div class="header">
            <h2>💰 Нетна → Брутна Заплата</h2>
        </div>

        <div class="card-body p-4">

            <form th:action="@{/companies/net-to-gross}"
                  method="post">

                <label class="form-label fw-bold">
                    Нетна заплата
                </label>

                <input type="number"
                       step="0.01"
                       name="netSalary"
                       class="form-control mb-4"
                       placeholder="Например 2500 €"
                       required>

                <button class="btn btn-primary w-100 btn-lg">
                    Изчисли
                </button>

            </form>

            <!-- RESULTS -->
            <div th:if="${result != null}"
                 class="result-box mt-4">

                <!-- ENTERED NET SALARY -->
                <div class="main-net">
                    💵 Нетна заплата:
                    <span th:text="${result.netSalary}"></span> €
                </div>

                <div class="result-item">
                    <span>Брутна заплата:</span>
                    <strong th:text="${result.grossSalary} + ' €'"></strong>
                </div>

                <div class="result-item">
                    <span>Осигуровки служител:</span>
                    <strong th:text="${result.employeeInsurance} + ' €'"></strong>
                </div>

                <div class="result-item">
                    <span>Данък:</span>
                    <strong th:text="${result.tax} + ' €'"></strong>
                </div>

                <div class="result-item">
                    <span>Осигуровки работодател:</span>
                    <strong th:text="${result.employerInsurance} + ' €'"></strong>
                </div>

                <hr>

                <div class="result-item">
                    <span>Общ разход работодател:</span>

                    <strong class="text-success"
                            th:text="${result.totalEmployerCost} + ' €'">
                    </strong>
                </div>

            </div>

            <div class="text-center mt-4">

                <a href="/companies"
                   class="btn btn-outline-dark">
                    ⬅ Назад
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
